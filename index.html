<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Language" content="en">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Shopping List">
  <meta name="theme-color" content="#F2F2F7">
  <title>Shopping List</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <header id="app-header">
    <button id="menu-btn" class="header-btn" aria-label="Menu">
      <svg width="22" height="18" viewBox="0 0 22 18"><rect y="0" width="22" height="2" rx="1" fill="currentColor"/><rect y="8" width="22" height="2" rx="1" fill="currentColor"/><rect y="16" width="22" height="2" rx="1" fill="currentColor"/></svg>
    </button>
    <h1 id="list-title">Shopping List</h1>
    <button id="filter-btn" class="header-btn" aria-label="Toggle filter">
      <svg id="filter-icon-eye" width="22" height="16" viewBox="0 0 22 16" fill="none">
        <path d="M11 1C6 1 2 8 2 8s4 7 9 7 9-7 9-7-4-7-9-7z" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <circle cx="11" cy="8" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
      </svg>
      <svg id="filter-icon-eye-off" width="22" height="16" viewBox="0 0 22 16" fill="none" class="hidden">
        <path d="M11 1C6 1 2 8 2 8s4 7 9 7 9-7 9-7-4-7-9-7z" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <circle cx="11" cy="8" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <line x1="2" y1="14" x2="20" y2="2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <main id="list-container"></main>

  <div id="input-bar">
    <input type="text" id="add-input" placeholder="Add an item…" autocomplete="off" autocorrect="on" autocapitalize="sentences">
    <div id="autocomplete-list" class="autocomplete-dropdown hidden"></div>
  </div>

  <!-- Category selection modal -->
  <div id="category-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2>Choose a Category</h2>
        <button id="modal-cancel" class="modal-cancel-btn">Cancel</button>
      </div>
      <div id="modal-categories" class="modal-body"></div>
      <div class="modal-new-category">
        <input type="text" id="new-category-input" placeholder="New category name…" autocomplete="off" autocorrect="on" autocapitalize="sentences">
        <button id="new-category-btn" class="modal-add-btn">Add</button>
      </div>
    </div>
  </div>

  <!-- Hamburger menu drawer -->
  <div id="menu-overlay" class="menu-overlay hidden"></div>
  <nav id="menu-drawer" class="menu-drawer hidden">
    <div class="menu-header">
      <h2>My Lists</h2>
      <button id="menu-close" class="header-btn" aria-label="Close menu">✕</button>
    </div>
    <ul id="menu-list-items"></ul>
    <button id="menu-new-list" class="menu-new-list-btn">+ New List</button>
  </nav>

  <!-- New list modal -->
  <div id="new-list-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 id="new-list-modal-title">New List</h2>
        <button id="new-list-cancel" class="modal-cancel-btn">Cancel</button>
      </div>
      <div class="modal-body">
        <input type="text" id="new-list-name" placeholder="List name…" autocomplete="off" autocorrect="on" autocapitalize="sentences">
        <div id="color-picker" class="color-picker"></div>
      </div>
      <button id="new-list-save" class="modal-save-btn">Create</button>
    </div>
  </div>

  <script src="app.js" type="module"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
